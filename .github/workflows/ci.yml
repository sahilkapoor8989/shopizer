name: CI

on:
  push:
    branches: [ "main", "3.2.7" ]
  pull_request:
    branches: [ "main", "3.2.7" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: SALESMANAGER
          MYSQL_USER: shopizer
          MYSQL_PASSWORD: shopizer-password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: ./mvnw clean install -DskipTests -q

      - name: Run unit tests
        run: ./mvnw test -pl sm-shop -Dtest="DateUtilTest,FileNameUtilsTest,SanitizeUtilsTest,GeoLocationUtilsTest,BeanUtilsTest" -Dsurefire.failIfNoSpecifiedTests=false

      - name: Run integration tests
        env:
          SPRING_PROFILES_ACTIVE: default
        run: ./mvnw test -pl sm-shop -Dtest="CategoryManagementAPIIntegrationTest,ProductManagementAPIIntegrationTest,ShoppingCartAPIIntegrationTest,CustomerRegistrationIntegrationTest,MerchantStoreApiIntegrationTest,UserApiIntegrationTest,ActuatorTest" -Dsurefire.failIfNoSpecifiedTests=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopizer-jar
          path: sm-shop/target/shopizer.jar
          retention-days: 7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sm-shop
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shopizer:latest,ghcr.io/${{ github.repository_owner }}/shopizer:${{ github.sha }}

      - name: Trigger CD in shopizer-infra
        if: github.ref == 'refs/heads/main'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.INFRA_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/rishabhgupta9695/shopizer-infra/actions/workflows/cd.yml/dispatches \
            -d '{"ref":"main"}'
